services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: sparkreel
      POSTGRES_PASSWORD: sparkreel
      POSTGRES_DB: sparkreel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparkreel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sparkreel
      MINIO_ROOT_PASSWORD: change-this-minio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 sparkreel change-this-minio-secret; do sleep 2; done;
      mc mb --ignore-existing local/sparkreel;
      exit 0;
      "

  app:
    build: .
    env_file: .env
    command: sh -c "npx prisma db push && node server.js"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    volumes:
      - media_data:/app/storage
      - ./models:/models:ro

  worker:
    build: .
    env_file: .env
    command: npm run worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - media_data:/app/storage
      - ./models:/models:ro

volumes:
  postgres_data:
  redis_data:
  minio_data:
  media_data:
